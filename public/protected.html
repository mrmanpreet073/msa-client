<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protected Page</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 2rem;
            border: 1px solid #292929;
            border-radius: 8px;
            background-color: #1e1e1e;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #07fc30;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <script>
        async function callProtectedApi() {

            let accessToken =localStorage.getItem("access_token");
            console.log('access token',accessToken);
            

            let response = await fetch("/api/protected",
                {
                    headers: { Authorization:`Bearer ${accessToken}`}
                }
            );

            if (response.status === 401) {

                const refreshResponse = await fetch("https://msa-auth.onrender.com/o/token",
                    {
                        method: "POST",
                        credentials: "include",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            grant_type: "refresh_token",
                            client_id: "8fbac80b837ba1506c0b525c89f815b0",
                            client_secret: "09611978af332989dce9bc4c7ae2406c65b7f4b23dbc391b0ec96d14d2a3fced",
                        })
                    }
                );

                if (!refreshResponse.ok) {
                    console.log(await refreshResponse.text());
                    alert("Session expired. Please log in again.");
                    window.location.href = "/";
                    return;
                }

                const tokens = await refreshResponse.json();

                localStorage.setItem("access_token", tokens.access_token);

                // Retry original request
                // return callProtectedApi();
            }

            return response.json();
        }

        callProtectedApi();

    </script>
    <div class="container">
        <h1>Protected Page <i>Accessed!</i> 🎉</h1>
        <p>This is a protected page.</p>
    </div>
</body>

</html>
